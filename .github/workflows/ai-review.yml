name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  # Job 1: the actual reviewer.
  #
  # Runs on a hosted runner without an OpenShell wrapper. Inference goes
  # directly to Infomaniak (Geneva, Switzerland), so the sovereignty
  # guarantee — "no prompt or code context leaves CH-hosted infrastructure
  # via the model path" — still holds. OpenShell's role here is moved to a
  # separate Compliance proof job below.
  review:
    runs-on: ubuntu-24.04
    env:
      INFOMANIAK_MODEL: ${{ vars.INFOMANIAK_MODEL || 'swiss-ai/Apertus-70B-Instruct-2509' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install openai SDK
        run: python -m pip install --quiet openai

      - name: Run AI review
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          INFERENCE_BASE_URL: https://api.infomaniak.com/2/ai/${{ vars.INFOMANIAK_PRODUCT_ID }}/openai/v1
          INFERENCE_API_KEY: ${{ secrets.INFOMANIAK_API_TOKEN }}
        run: python scripts/review-bot.py

      - name: Upload audit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review-audit-pr-${{ github.event.pull_request.number }}
          path: audit/
          if-no-files-found: warn
          retention-days: 90

  # Job 2: Compliance proof.
  #
  # Spins up an OpenShell sandbox with the same policy.yaml the reviewer
  # would use on a self-hosted runner, then attempts to egress to a host
  # that is not in the allowlist. The job FAILS LOUD if OpenShell allows
  # the call — that is the desired behaviour: a green check here is a
  # signed audit record that the policy denies non-allowlisted egress.
  egress-audit-demo:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenShell
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/uv" tool install -U openshell

      - name: Start gateway
        run: openshell gateway start

      - name: Attempt blocked egress to api.openai.com (must be denied)
        run: |
          set +e
          openshell sandbox create --policy policy.yaml -- \
            curl -sS --max-time 10 https://api.openai.com/
          EXIT=$?
          set -e
          if [ "$EXIT" -eq 0 ]; then
            echo "::error::OpenShell allowed egress to api.openai.com — policy is broken"
            exit 1
          fi
          echo "::notice::OpenShell denied egress to api.openai.com (curl exit=$EXIT) — policy enforced"

      - name: Capture OpenShell event log
        if: always()
        run: openshell logs --since 5m --json > openshell-events.jsonl 2>&1 || true

      - name: Upload egress-audit artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openshell-egress-audit-pr-${{ github.event.pull_request.number }}
          path: openshell-events.jsonl
          if-no-files-found: ignore
          retention-days: 90
